<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="NSP Cases AI Email Enquiry Handler demo thumbnail">
  <defs>
    <linearGradient id="nspBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="nspGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="nspShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#nspBg)"/>
  <rect width="1600" height="900" fill="url(#nspGlow)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 225 H1600 M0 450 H1600 M0 675 H1600"/>
    <path d="M400 0 V900 M800 0 V900 M1200 0 V900"/>
  </g>

  <!-- Envelope icon top-left -->
  <g transform="translate(90 90)" fill="#ffffff" fill-opacity="0.95">
    <rect x="0" y="8" width="96" height="72" rx="10" fill="none" stroke="#ffffff" stroke-width="5"/>
    <path d="M6 18 L48 52 L90 18" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title block -->
  <g font-family="Inter, Segoe UI, system-ui, sans-serif" fill="#ffffff">
    <text x="210" y="140" font-size="58" font-weight="700" letter-spacing="-1">AI Email Handler</text>
    <text x="210" y="190" font-size="30" font-weight="500" fill-opacity="0.82">NSP Cases &#8226; UK Flight Case Manufacturer</text>
  </g>

  <!-- Play button centered -->
  <g transform="translate(800 470)" filter="url(#nspShadow)">
    <circle r="96" fill="#ffffff"/>
    <path d="M-28 -44 L54 0 L-28 44 Z" fill="#4F46E5"/>
  </g>

  <!-- Bottom metric strip -->
  <g font-family="Inter, Segoe UI, system-ui, sans-serif" fill="#ffffff">
    <text x="90" y="820" font-size="36" font-weight="600" fill-opacity="0.95">&lt; 60s response</text>
    <text x="520" y="820" font-size="36" font-weight="600" fill-opacity="0.5">&#8226;</text>
    <text x="560" y="820" font-size="36" font-weight="600" fill-opacity="0.95">19-node n8n workflow</text>
    <text x="1510" y="820" font-size="36" font-weight="600" fill-opacity="0.95" text-anchor="end">GPT-4o Vision</text>
  </g>
</svg>
