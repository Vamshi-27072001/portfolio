<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Restaurant AI Agent Taco Bell UK demo thumbnail">
  <defs>
    <linearGradient id="rstBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EA8006"/>
    </linearGradient>
    <linearGradient id="tacoShell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#CA8A04"/>
    </linearGradient>
    <linearGradient id="darkTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F2937"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="rstShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#rstBg)"/>

  <!-- Decorative big circles -->
  <g fill="#ffffff" opacity="0.12">
    <circle cx="180" cy="780" r="180"/>
    <circle cx="1500" cy="140" r="140"/>
    <circle cx="1200" cy="820" r="90"/>
    <circle cx="780" cy="90" r="60"/>
  </g>
  <g fill="#ffffff" opacity="0.06">
    <circle cx="1100" cy="460" r="260"/>
    <circle cx="420" cy="180" r="110"/>
  </g>

  <!-- LEFT: Two angled "photo" tiles with food illustrations -->
  <!-- Tile 1: Pizza (top, slight left tilt) -->
  <g transform="translate(120 130) rotate(-8)" filter="url(#rstShadow)">
    <path d="M0 0 L300 0 L330 340 L-30 340 Z" fill="url(#darkTile)"/>
    <!-- Pizza illustration -->
    <g transform="translate(150 180)">
      <!-- Crust -->
      <circle r="120" fill="#D97706"/>
      <!-- Cheese -->
      <circle r="104" fill="#FCD34D"/>
      <!-- Sauce swirls -->
      <path d="M-80 -40 Q -20 -70 40 -40 Q 80 -20 70 30 Q 50 70 0 80 Q -60 70 -80 20 Q -90 -20 -80 -40 Z" fill="#DC2626" opacity="0.6"/>
      <!-- Pepperoni -->
      <circle cx="-40" cy="-30" r="14" fill="#B91C1C"/>
      <circle cx="30" cy="-40" r="14" fill="#B91C1C"/>
      <circle cx="50" cy="20" r="14" fill="#B91C1C"/>
      <circle cx="-20" cy="40" r="14" fill="#B91C1C"/>
      <circle cx="-60" cy="10" r="10" fill="#B91C1C"/>
      <!-- Basil leaves -->
      <ellipse cx="-10" cy="-20" rx="8" ry="4" fill="#15803D" transform="rotate(30 -10 -20)"/>
      <ellipse cx="20" cy="30" rx="8" ry="4" fill="#15803D" transform="rotate(-40 20 30)"/>
    </g>
  </g>

  <!-- Tile 2: Taco (bottom, slight right tilt) -->
  <g transform="translate(310 500) rotate(10)" filter="url(#rstShadow)">
    <path d="M0 0 L280 -20 L320 280 L20 320 Z" fill="url(#darkTile)"/>
    <!-- Taco illustration -->
    <g transform="translate(160 150)">
      <!-- Shell -->
      <path d="M-110 40 Q 0 -110 110 40 L 90 70 Q 0 -40 -90 70 Z" fill="url(#tacoShell)" stroke="#A16207" stroke-width="3"/>
      <!-- Lettuce -->
      <path d="M-85 30 Q -60 0 -40 20 Q -20 0 0 20 Q 20 0 40 20 Q 60 0 85 30" fill="none" stroke="#16A34A" stroke-width="12" stroke-linecap="round"/>
      <!-- Tomatoes -->
      <circle cx="-45" cy="25" r="9" fill="#DC2626"/>
      <circle cx="10" cy="20" r="9" fill="#DC2626"/>
      <circle cx="55" cy="28" r="9" fill="#DC2626"/>
      <!-- Cheese shreds -->
      <rect x="-60" y="10" width="22" height="4" rx="2" fill="#FBBF24"/>
      <rect x="-20" y="8" width="22" height="4" rx="2" fill="#FBBF24"/>
      <rect x="30" y="12" width="22" height="4" rx="2" fill="#FBBF24"/>
      <!-- Meat layer -->
      <path d="M-75 42 Q 0 20 75 42 Q 0 50 -75 42 Z" fill="#92400E"/>
    </g>
  </g>

  <!-- RIGHT: Editorial typography stack -->
  <g font-family="Inter, Segoe UI, system-ui, sans-serif">
    <!-- Top label stripe -->
    <g transform="translate(760 130)">
      <rect x="0" y="0" width="32" height="32" fill="#ffffff"/>
      <rect x="46" y="0" width="280" height="32" fill="#ffffff"/>
      <text x="58" y="24" font-size="22" font-weight="700" fill="#1F2937" letter-spacing="2">24/7 COVERAGE</text>
      <rect x="344" y="14" width="42" height="4" fill="#1F2937"/>
    </g>

    <!-- Main "AI AGENT" block w/ grungy impact feel -->
    <g transform="translate(760 210)">
      <!-- yellow background stripe behind title -->
      <rect x="-12" y="0" width="740" height="140" fill="#1F2937"/>
      <text x="20" y="108" font-size="150" font-weight="900" fill="#F59E0B" letter-spacing="-2" font-family="'Arial Black', Impact, Inter, sans-serif">RESTAURANT</text>
    </g>

    <!-- Secondary line (white on transparent) -->
    <g transform="translate(760 380)">
      <rect x="0" y="0" width="32" height="32" fill="#1F2937"/>
      <rect x="46" y="0" width="420" height="32" fill="#ffffff"/>
      <text x="58" y="24" font-size="22" font-weight="700" fill="#1F2937" letter-spacing="2">AI AGENT &#8226; TACO BELL UK</text>
    </g>

    <!-- Sub copy -->
    <g transform="translate(760 470)">
      <text x="0" y="0" font-size="26" font-weight="500" fill="#1F2937">Zero-hallucination Telegram bot —</text>
      <text x="0" y="36" font-size="26" font-weight="500" fill="#1F2937">100+ menu items, &lt; 2s latency.</text>
    </g>

    <!-- WATCH DEMO button (black block) -->
    <g transform="translate(760 570)" filter="url(#rstShadow)">
      <rect x="0" y="0" width="320" height="74" fill="#1F2937"/>
      <path d="M40 23 L40 51 L66 37 Z" fill="#ffffff"/>
      <text x="90" y="48" font-size="24" font-weight="800" fill="#ffffff" letter-spacing="3">WATCH DEMO</text>
    </g>
    <!-- Dots next to button -->
    <g transform="translate(1110 607)" fill="#1F2937">
      <circle cx="0" cy="0" r="4"/>
      <circle cx="14" cy="0" r="4"/>
      <circle cx="28" cy="0" r="4"/>
      <circle cx="42" cy="0" r="4"/>
    </g>

    <!-- Bottom metric badges -->
    <g transform="translate(760 720)">
      <text x="0" y="40" font-size="68" font-weight="900" fill="#1F2937" font-family="'Arial Black', Impact, Inter, sans-serif">99.98%</text>
      <text x="0" y="78" font-size="20" font-weight="700" fill="#1F2937" letter-spacing="2">COST REDUCTION</text>

      <text x="340" y="40" font-size="68" font-weight="900" fill="#1F2937" font-family="'Arial Black', Impact, Inter, sans-serif">14</text>
      <text x="340" y="78" font-size="20" font-weight="700" fill="#1F2937" letter-spacing="2">EU/UK ALLERGENS</text>
      <g transform="translate(430 34)" fill="#1F2937">
        <circle cx="0" cy="0" r="3"/>
        <circle cx="10" cy="0" r="3"/>
        <circle cx="20" cy="0" r="3"/>
        <circle cx="30" cy="0" r="3"/>
      </g>
    </g>
  </g>
</svg>
