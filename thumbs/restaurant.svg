<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Restaurant AI Agent Taco Bell UK demo thumbnail">
  <defs>
    <linearGradient id="rstBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
    <radialGradient id="rstGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="rstShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#rstBg)"/>
  <rect width="1600" height="900" fill="url(#rstGlow)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 225 H1600 M0 450 H1600 M0 675 H1600"/>
    <path d="M400 0 V900 M800 0 V900 M1200 0 V900"/>
  </g>

  <!-- Fork + knife icon top-left -->
  <g transform="translate(90 90)" fill="#ffffff">
    <!-- Fork -->
    <path d="M10 6 V34 M26 6 V34 M42 6 V34 M26 34 V82" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Knife -->
    <path d="M72 6 C78 30 78 58 72 82 M72 6 C66 30 66 58 72 82" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Title block -->
  <g font-family="Inter, Segoe UI, system-ui, sans-serif" fill="#ffffff">
    <text x="210" y="140" font-size="58" font-weight="700" letter-spacing="-1">Restaurant AI Agent</text>
    <text x="210" y="190" font-size="30" font-weight="500" fill-opacity="0.88">Taco Bell UK &#8226; Telegram Bot &#8226; GPT-4o-mini</text>
  </g>

  <!-- Play button centered -->
  <g transform="translate(800 470)" filter="url(#rstShadow)">
    <circle r="96" fill="#ffffff"/>
    <path d="M-28 -44 L54 0 L-28 44 Z" fill="#E11D48"/>
  </g>

  <!-- Bottom metric strip -->
  <g font-family="Inter, Segoe UI, system-ui, sans-serif" fill="#ffffff">
    <text x="90" y="820" font-size="36" font-weight="600">99.98% cost &#8595;</text>
    <text x="470" y="820" font-size="36" font-weight="600" fill-opacity="0.5">&#8226;</text>
    <text x="510" y="820" font-size="36" font-weight="600">Zero hallucinations</text>
    <text x="1510" y="820" font-size="36" font-weight="600" text-anchor="end">100+ menu items</text>
  </g>
</svg>
