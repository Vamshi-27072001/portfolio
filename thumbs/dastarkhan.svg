<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0a2318"/>
      <stop offset="100%" stop-color="#040D08"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="50%" stop-color="#F5CC5A"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="play-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5CC5A"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="arch-inner" cx="50%" cy="70%" r="55%">
      <stop offset="0%" stop-color="rgba(212,175,55,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="candle-l" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,130,0,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,130,0,0)"/>
    </radialGradient>
    <radialGradient id="candle-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,160,40,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,160,40,0)"/>
    </radialGradient>
    <radialGradient id="candle-t" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,200,70,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,200,70,0)"/>
    </radialGradient>
    <filter id="gold-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="title-glow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="rgba(0,0,0,0.9)"/>
    </filter>
