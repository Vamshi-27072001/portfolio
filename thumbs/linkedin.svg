<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="LinkedIn Post Manager AI Content Engine demo thumbnail - coming soon">
  <defs>
    <linearGradient id="liBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A66C2"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <radialGradient id="liGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="liShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#liBg)"/>
  <rect width="1600" height="900" fill="url(#liGlow)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 225 H1600 M0 450 H1600 M0 675 H1600"/>
    <path d="M400 0 V900 M800 0 V900 M1200 0 V900"/>
  </g>

  <!-- Link / chain icon top-left -->
  <g transform="translate(90 90)" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 48 a22 22 0 0 1 22 -22 h18 a22 22 0 0 1 0 44 h-10"/>
    <path d="M82 48 a22 22 0 0 1 -22 22 h-18 a22 22 0 0 1 0 -44 h10"/>
  </g>

  <!-- Title block -->
  <g font-family="Inter, Segoe UI, system-ui, sans-serif" fill="#ffffff">
    <text x="210" y="140" font-size="58" font-weight="700" letter-spacing="-1">LinkedIn Post Manager</text>
    <text x="210" y="190" font-size="30" font-weight="500" fill-opacity="0.88">Telegram &#8594; LinkedIn &#8226; AI Content Engine</text>
  </g>

  <!-- Coming Soon pill centered -->
  <g transform="translate(800 470)" filter="url(#liShadow)">
    <rect x="-230" y="-70" width="460" height="140" rx="70" fill="#ffffff"/>
    <text x="0" y="18" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="56" font-weight="700" fill="#0A66C2" text-anchor="middle" letter-spacing="4">COMING SOON</text>
  </g>

  <!-- Small helper under pill -->
  <g font-family="Inter, Segoe UI, system-ui, sans-serif" fill="#ffffff">
    <text x="800" y="610" font-size="26" font-weight="500" fill-opacity="0.75" text-anchor="middle">Demo video recording in progress</text>
  </g>

  <!-- Bottom metric strip -->
  <g font-family="Inter, Segoe UI, system-ui, sans-serif" fill="#ffffff">
    <text x="90" y="820" font-size="36" font-weight="600">98% time &#8595;</text>
    <text x="380" y="820" font-size="36" font-weight="600" fill-opacity="0.5">&#8226;</text>
    <text x="420" y="820" font-size="36" font-weight="600">&#163;24K/yr saved</text>
    <text x="1510" y="820" font-size="36" font-weight="600" text-anchor="end">13-node pipeline</text>
  </g>
</svg>
